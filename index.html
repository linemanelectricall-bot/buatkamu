<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{height:100vh;overflow:hidden;background:radial-gradient(circle at top,#1a1f4a,#0f1330);color:#fff}

.bubble{position:absolute;bottom:-100px;border-radius:50%;background:rgba(255,255,255,.08);animation:rise linear infinite}
@keyframes rise{to{transform:translateY(-120vh);opacity:0}}

.card{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:340px;padding:25px;border-radius:25px;text-align:center;background:rgba(255,255,255,.06);backdrop-filter:blur(20px);box-shadow:0 20px 60px rgba(0,0,0,.5)}

.avatar{width:110px;height:110px;margin:auto;border-radius:20px;overflow:hidden;box-shadow:0 0 25px rgba(255,105,135,.6)}
.avatar img{width:100%;height:100%;object-fit:cover}

.avatar.active{animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

button{width:100%;margin-top:15px;padding:12px;border:none;border-radius:30px;background:linear-gradient(45deg,#ff6b81,#ff9aa2);color:#fff;font-weight:600}
.hidden{display:none}

.heart{position:absolute;font-size:20px;animation:fly 3s linear infinite}
@keyframes fly{from{transform:translateY(0);opacity:1}to{transform:translateY(-200px);opacity:0}}

.modal{position:fixed;bottom:0;left:0;width:100%;background:#1b1f3a;padding:20px;border-radius:20px 20px 0 0;display:none}
.modal.active{display:block}
</style>
</head>
<body>

<script>
for(let i=0;i<25;i++){
 let b=document.createElement('div');b.className='bubble';
 let s=Math.random()*30+10;
 b.style.width=s+'px';b.style.height=s+'px';
 b.style.left=Math.random()*100+'%';
 b.style.animationDuration=(5+Math.random()*5)+'s';
 document.body.appendChild(b);
}
</script>

<!-- STEP 1 -->
<div class="card" id="step1">
 <div class="avatar active">
  <img src="char1.gif">
 </div>
 <h1>Alooo Kamuuu! 🥳</h1>
 <p>Ada sesuatu spesial buat kamu 💖</p>
 <button onclick="startApp()">Mulai ✨</button>
</div>

<!-- STEP 2 -->
<div class="card hidden" id="step2">
 <div class="avatar active">
  <img src="char2.gif">
 </div>
 <h3>Tahun Lahir Kamu? 🤔</h3>
 <input type="range" min="1980" max="2025" value="2000" id="year">
 <p id="yearText">2000</p>
 <button onclick="showResult()">Lanjutkan →</button>
</div>

<!-- RESULT -->
<div class="card hidden" id="result">
 <div class="avatar active">
  <img src="char3.gif">
 </div>
 <h2 id="title"></h2>
 <p id="msg"></p>
 <button onclick="openShare()">Kirim ke Dia 💌</button>
</div>

<div class="modal" id="shareModal">
 <h3>Kirim ke Dia 💌</h3>
 <button onclick="shareWA()">WhatsApp</button>
</div>

<script>
let yearInput=document.getElementById('year');
let yearText=document.getElementById('yearText');
yearInput.oninput=()=>yearText.innerText=yearInput.value;

function startApp(){
 document.getElementById('step1').classList.add('hidden');
 document.getElementById('step2').classList.remove('hidden');
}

function showResult(){
 let age=new Date().getFullYear()-yearInput.value;
 document.getElementById('step2').classList.add('hidden');
 document.getElementById('result').classList.remove('hidden');

 document.getElementById('title').innerHTML=`✨Selamat ulang tahun ke-${age}!✨`;

 let text=`Happy Birthday, Nauraa! 🥳✨\n\nSemoga di usia baru ini, kamu selalu di keliligi kebahagiaan, kesehatan, dan Semoga doa serta cita-cita kamu bisa terwujud\nYou’re as special as your name✨`;
 typeWriter(text);
 spawnHearts();
}

function typeWriter(t){
 let el=document.getElementById('msg');el.innerHTML='';
 let i=0;
 function typing(){
  if(i<t.length){
   if(t[i]=='\n') el.innerHTML+='<br>';
   else el.innerHTML+=t[i];
   i++;setTimeout(typing,25);
  }
 }
 typing();
}

function spawnHearts(){
 setInterval(()=>{
  let h=document.createElement('div');
  h.className='heart';h.innerHTML='💖';
  h.style.left=Math.random()*100+'%';h.style.top='80%';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),3000);
 },300);
}

function openShare(){
 document.getElementById('shareModal').classList.add('active');
}

function shareWA(){
 let text=encodeURIComponent('Aku punya sesuatu buat kamu 💖 '+location.href);
 window.open('https://wa.me/?text='+text,'_blank');
}
</script>

</body>
</html>
