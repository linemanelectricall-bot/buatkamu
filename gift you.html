<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  text-align: center;
  color: white;
  overflow: hidden;
}

h1 {
  margin-top: 50px;
  font-size: 2.5em;
}

.cake {
  margin: 50px auto;
  position: relative;
  width: 200px;
  height: 200px;
}

.layer {
  background: #ffcc80;
  height: 60px;
  border-radius: 10px;
  margin: 5px 0;
}

.candle {
  width: 10px;
  height: 40px;
  background: #fff;
  position: absolute;
  top: -40px;
  left: 50%;
  transform: translateX(-50%);
}

.flame {
  width: 15px;
  height: 15px;
  background: orange;
  border-radius: 50%;
  position: absolute;
  top: -15px;
  left: -2px;
  animation: flicker 0.2s infinite alternate;
}

@keyframes flicker {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: #ff4081;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.hidden {
  display: none;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}

.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  top: -10px;
}
</style>
</head>

<body>

<h1>🎉 Selamat Ulang Tahun, Anang! 🎉</h1>
<p>Semoga panjang umur, sehat selalu, dan makin sukses 🚀</p>

<div class="cake">
  <div class="candle">
    <div class="flame" id="flame"></div>
  </div>
  <div class="layer"></div>
  <div class="layer"></div>
  <div class="layer"></div>
</div>

<button onclick="blowCandle()">Tiup Lilin 💨</button>

<p id="wish" class="hidden">🎂 Harapanmu akan terkabul! Jangan lupa traktir 😆</p>

<audio id="music" autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<script>
function blowCandle() {
  document.getElementById("flame").style.display = "none";
  document.getElementById("wish").style.display = "block";
  createConfetti();
}

function createConfetti() {
  for (let i = 0; i < 80; i++) {
    let confetti = document.createElement("div");
    confetti.classList.add("confetti");

    confetti.style.left = Math.random() * window.innerWidth + "px";
    confetti.style.backgroundColor =
      "hsl(" + Math.random() * 360 + ", 100%, 50%)";
    confetti.style.animation = "fall " + (Math.random() * 3 + 2) + "s linear";

    document.body.appendChild(confetti);

    setTimeout(() => confetti.remove(), 5000);
  }
}
</script>

</body>
</html>
